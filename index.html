<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/150/ff4081/ffffff?text=SkinMe">
    <title>個人膚況分析日記 v2</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

    <style>
        :root {
            --primary-color: #ff4081;
            --bg-color: #fff1f5;
            --text-color: #333;
            --card-bg: #fff;
        }
        body {
            font-family: 'PingFang TC', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { color: #c2185b; font-size: 20px; margin-bottom: 5px;}
        .subtitle { font-size: 12px; color: #888; margin-bottom: 20px;}

        .camera-container {
            position: relative;
            width: 300px;
            height: 300px;
            overflow: hidden;
            border-radius: 20px; /* 改為方圓形，能看清全臉瑕疵標記 */
            border: 5px solid var(--primary-color);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: #000;
        }

        #video, #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 鏡像畫面 */
        }

        #overlay {
            z-index: 10;
            pointer-events: none;
        }

        .controls { margin-top: 25px; text-align: center; width: 100%;}

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 64, 129, 0.3);
            font-weight: bold;
            transition: 0.2s;
            margin: 0 5px;
        }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { background-color: #ccc; box-shadow: none; cursor: not-allowed;}

        .result-card {
            background: var(--card-bg);
            border-radius: 15px;
            width: 300px;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: none;
            text-align: left;
        }
        .result-card h3 { margin-top: 0; color: #c2185b; font-size: 16px;}
        .stat-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px;}
        .stat-label { color: #666; }
        .stat-value { font-weight: bold; }
        
        .badge {
            background-color: #ff5722;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        .diary-section {
            width: 300px;
            margin-top: 30px;
            text-align: left;
            padding-bottom: 30px;
        }
        .diary-section h2 { font-size: 18px; color: var(--text-color); }
        .diary-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .diary-item {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            font-size: 14px;
        }
        .diary-date { color: #888; }
        .diary-index { font-weight: bold; color: #c2185b; }

        #status { font-size: 12px; color: var(--primary-color); margin-top: 10px; font-weight: bold;}
    </style>
</head>
<body>

    <h1>SkinMe 膚況日記 v2</h1>
    <p class="subtitle">AI 臉部追蹤 ＆ 膚色不均瑕疵點掃描</p>

    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>
    <p id="status">正在載入 AI 模型...</p>

    <div class="controls">
        <button class="btn" id="captureBtn" disabled>開始掃描分析</button>
        <button class="btn" id="clearBtn" style="background-color: #666; font-size: 12px; padding: 8px 15px;">清空歷史</button>
    </div>

    <div class="result-card" id="resultCard">
        <h3>當日膚況報告</h3>
        <div class="stat-row">
            <span class="stat-label">檢測時間:</span>
            <span class="stat-value" id="resTime"></span>
        </div>
        <div class="stat-row">
            <span class="stat-label">疑似瑕疵/異常點:</span>
            <span class="stat-value" style="color: #ff5722;" id="resBlemishCount">0 個</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">基礎泛紅指數:</span>
            <span class="stat-value" id="resRedIndex">0%</span>
        </div>
        <p style="font-size: 11px; color: #999; margin-top: 10px; line-height: 1.4;">
            * 提示：畫面上標記的黃圈代表局部暗沉/粉刺區，紅圈代表可能發炎/痘痘區。請在光線均勻處測量較為準確。
        </p>
    </div>

    <div class="diary-section">
        <h2>歷史追蹤紀錄</h2>
        <ul class="diary-list" id="diaryList"></ul>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status');
        const captureBtn = document.getElementById('captureBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultCard = document.getElementById('resultCard');
        const resTime = document.getElementById('resTime');
        const resBlemishCount = document.getElementById('resBlemishCount');
        const resRedIndex = document.getElementById('resRedIndex');
        const diaryList = document.getElementById('diaryList');

        let model = null;
        let isFaceDetected = false;
        let currentFacePrediction = null;
        let isAnalyzing = false;

        async function setupApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' } 
                });
                video.srcObject = stream;

                statusText.innerText = "正在初始化 AI 人臉追蹤...";
                model = await blazeface.load();
                
                statusText.innerText = "✔ AI 準備就緒，請將臉部對準畫面";
                captureBtn.disabled = false;

                detectFace();
                renderDiary();
            } catch (err) {
                statusText.innerText = "🚫 無法啟動相機或 AI";
                alert('初始化失敗：' + err.message);
            }
        }

        async function detectFace() {
            if (!model || isAnalyzing) return;

            const predictions = await model.estimateFaces(video, false);
            
            const ctx = overlay.getContext('2d');
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            ctx.clearRect(0, 0, overlay.width, overlay.height);

            if (predictions.length > 0) {
                isFaceDetected = true;
                currentFacePrediction = predictions[0];
                const start = currentFacePrediction.topLeft;
                const end = currentFacePrediction.bottomRight;
                const size = [end[0] - start[0], end[1] - start[1]];

                // 畫出淡淡的臉部追蹤範圍
                ctx.strokeStyle = "rgba(255, 64, 129, 0.4)";
                ctx.lineWidth = 2;
                ctx.strokeRect(start[0], start[1], size[0], size[1]);
                
                statusText.innerText = "✔ 臉部已鎖定，可以開始分析";
                statusText.style.color = "green";
            } else {
                isFaceDetected = false;
                statusText.innerText = "❓ 請將臉部完整置於畫面中";
                statusText.style.color = "#ff4081";
            }

            requestAnimationFrame(detectFace);
        }

        // --- 核心：數值計算與局部瑕疵掃描演算法 ---
        captureBtn.addEventListener('click', () => {
            if (!isFaceDetected || !currentFacePrediction) {
                alert('請先讓 AI 鎖定您的臉部');
                return;
            }

            isAnalyzing = true; // 暫停實時追蹤，定格畫面
            video.pause();

            const ctx = overlay.getContext('2d');
            // 將當前影像繪製到 canvas 上以便讀取像素
            ctx.drawImage(video, 0, 0, overlay.width, overlay.height);

            const start = currentFacePrediction.topLeft;
            const end = currentFacePrediction.bottomRight;
            const faceX = Math.max(0, start[0]);
            const faceY = Math.max(0, start[1]);
            const faceW = Math.min(overlay.width - faceX, end[0] - start[0]);
            const faceH = Math.min(overlay.height - faceY, end[1] - start[1]);

            // 1. 獲取全臉整體的平均膚色與亮度
            const faceImageData = ctx.getImageData(faceX, faceY, faceW, faceH);
            const pixels = faceImageData.data;
            
            let totalR = 0, totalG = 0, totalB = 0, totalY = 0;
            let count = 0;

            for (let i = 0; i < pixels.length; i += 4) {
                const r = pixels[i];
                const g = pixels[i+1];
                const b = pixels[i+2];
                // 計算亮度 (標準心理學公式)
                const y = 0.299 * r + 0.587 * g + 0.114 * b;
                
                totalR += r; totalG += g; totalB += b; totalY += y;
                count++;
            }

            const avgFaceR = totalR / count;
            const avgFaceG = totalG / count;
            const avgFaceB = totalB / count;
            const avgFaceY = totalY / count; // 全臉平均亮度

            // 計算基礎泛紅指數
            const faceGbAvg = (avgFaceG + avgFaceB) / 2;
            let rednessIndex = faceGbAvg > 0 ? Math.round(((avgFaceR - faceGbAvg) / faceGbAvg) * 100) : 0;
            rednessIndex = Math.max(0, Math.min(100, rednessIndex));

            // 2. 局部網格掃描 (將臉部切成 12x12 像素的小區塊，尋找局部突變點)
            const gridSize = 12;
            let blemishCount = 0;

            // 重新清空畫布，準備繪製定格畫面與標記圈圈
            ctx.drawImage(video, 0, 0, overlay.width, overlay.height);

            for (let y = faceY + 10; y < (faceY + faceH - 10); y += gridSize) {
                for (let x = faceX + 10; x < (faceX + faceW - 10); x += gridSize) {
                    
                    // 取得這個小網格的像素資料
                    const gridData = ctx.getImageData(x, y, gridSize, gridSize).data;
                    let gR = 0, gG = 0, gB = 0, gY = 0;
                    let gCount = 0;

                    for (let i = 0; i < gridData.length; i += 4) {
                        const r = gridData[i];
                        const g = gridData[i+1];
                        const b = gridData[i+2];
                        gR += r; gG += g; gB += b;
                        gY += (0.299 * r + 0.587 * g + 0.114 * b);
                        gCount++;
                    }

                    const cellR = gR / gCount;
                    const cellG = gG / gCount;
                    const cellB = gB / gCount;
                    const cellY = gY / gCount; // 當前網格亮度

                    // 演算法規則 A：如果這個點的紅色特徵顯著高於全臉平均（疑似痘痘、發炎）
                    if ((cellR - cellG) > (avgFaceR - avgFaceG) + 18) {
                        ctx.strokeStyle = "#ff1744"; // 紅圈
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(x + gridSize/2, y + gridSize/2, 6, 0, 2 * Math.PI);
                        ctx.stroke();
                        blemishCount++;
                    } 
                    // 演算法規則 B：如果這個點的亮度顯著低於全臉平均（疑似黑斑、暗沉、深色痘疤/粉刺）
                    else if (cellY < avgFaceY - 25) {
                        ctx.strokeStyle = "#ffea00"; // 黃圈
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(x + gridSize/2, y + gridSize/2, 5, 0, 2 * Math.PI);
                        ctx.stroke();
                        blemishCount++;
                    }
                }
            }

            // 3. 顯示結果與儲存
            const now = new Date();
            const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
            
            resTime.innerText = timeStr;
            resBlemishCount.innerText = blemishCount + " 個";
            resRedIndex.innerText = rednessIndex + "%";
            resultCard.style.display = 'block';

            saveToDiary(blemishCount, rednessIndex, timeStr);

            // 3秒後恢復動態相機偵測
            setTimeout(() => {
                video.play();
                isAnalyzing = false;
                detectFace();
            }, 4000);
        });

        function saveToDiary(blemish, redness, time) {
            const now = new Date();
            const dateStr = now.getFullYear() + '/' + 
                           String(now.getMonth() + 1).padStart(2, '0') + '/' + 
                           String(now.getDate()).padStart(2, '0');

            const newEntry = {
                date: dateStr,
                time: time,
                blemish: blemish,
                redness: redness
            };

            let history = JSON.parse(localStorage.getItem('skin_history_v2')) || [];
            history.unshift(newEntry);
            if (history.length > 30) history.pop();

            localStorage.setItem('skin_history_v2', JSON.stringify(history));
            renderDiary();
        }

        function renderDiary() {
            const history = JSON.parse(localStorage.getItem('skin_history_v2')) || [];
            diaryList.innerHTML = '';

            if (history.length === 0) {
                diaryList.innerHTML = '<li style="color:#888; font-size:12px; text-align:center;">尚無紀錄，開始您的第一次檢測吧！</li>';
                return;
            }

            history.forEach(entry => {
                const li = document.createElement('li');
                li.className = 'diary-item';
                li.innerHTML = `
                    <div>
                        <span class="diary-date">${entry.date} ${entry.time}</span>
                    </div>
                    <div style="text-align: right;">
                        <span class="diary-index" style="color:#ff5722; margin-right:8px;">瑕疵: ${entry.blemish}個</span>
                        <span class="diary-index">泛紅: ${entry.redness}%</span>
                    </div>
                `;
                diaryList.appendChild(li);
            });
        }

        clearBtn.addEventListener('click', () => {
            if (confirm('確定要清空所有歷史紀錄嗎？')) {
                localStorage.removeItem('skin_history_v2');
                resultCard.style.display = 'none';
                renderDiary();
            }
        });

        window.addEventListener('load', setupApp);
    </script>
</body>
</html>
